# .github/workflows/build.yml
name: CI Builds

on:
  push:
    branches:
      - master
      - winui-build
  pull_request:
    branches:
      - master
      - winui-build
  workflow_dispatch:  # This adds the manual trigger
  
jobs:
  build_uwp:
    name: Build-FFmpegInteropX UWP
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          submodules: true
          fetch-depth: 0

      - name: Create Output Folder
        run: |
          mkdir Output
          mkdir Output\NuGet

      - name: Run Build Script
        shell: powershell
        run: |
          ./Build-FFmpegInteropX.ps1 -Platforms x64

  build_desktop:
    name: Build-FFmpegInteropX Desktop
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          submodules: true
          fetch-depth: 0

      - name: Create Output Folder
        run: |
          mkdir Output
          mkdir Output\NuGet

      - name: Run Build Script
        shell: powershell
        run: |
          ./Build-FFmpegInteropX.ps1 -WindowsTarget Desktop -Platforms x64

      - name: Upload Artifact
        uses: actions/upload-artifact@v2
        with:
          name: build-output
          path: Output/
